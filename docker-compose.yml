services:
  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    restart: always
    environment:
      - DOMAIN="${DOMAIN}"
    expose:
      - '80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - default
      - dokploy-network
    depends_on:
      - express-api
      - next-app
      - react-spa

  # DB
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - db-data:/var/lib/postgresql/data
    expose:
      - '5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 5s
      timeout: 5s
      retries: 5

  # Prisma migrate
  migration-runner:
    image: express-api:latest
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?schema=public
    command: npx prisma migrate deploy
    depends_on:
      db:
        condition: service_healthy

  # Express API
  express-api:
    build:
      context: .
      dockerfile: apps/express-api/Dockerfile
    image: express-api:latest
    restart: always
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?schema=public
      - PORT=4200
      - SITE_URL=https://${DOMAIN}
    expose:
      - '4200'
    networks:
      default:
        aliases:
          - express-api
    depends_on:
      migration-runner:
        condition: service_completed_successfully

  # Next.js App
  next-app:
    build:
      context: .
      dockerfile: apps/next-app/Dockerfile
      args:
        - NEXT_PUBLIC_SITE_URL=https://next.${DOMAIN}
        - NEXT_PUBLIC_PROJECT_NAME=${SITE_NAME}
        - OWNER_NAME=${OWNER_NAME}
        - OWNER_EMAIL=${OWNER_EMAIL}
    image: next-app:latest
    restart: always
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?schema=public
      - NEXT_PUBLIC_SITE_URL=https://next.${DOMAIN}
      - NEXT_PUBLIC_PROJECT_NAME=${SITE_NAME}
      - OWNER_NAME=${OWNER_NAME}
      - OWNER_EMAIL=${OWNER_EMAIL}
    expose:
      - '3000'
    networks:
      default:
        aliases:
          - next-app
    depends_on:
      migration-runner:
        condition: service_completed_successfully

  # React SPA
  react-spa:
    build:
      context: .
      dockerfile: apps/react-spa/Dockerfile
      args:
        - VITE_API_URL=https://${DOMAIN}
        - VITE_PUBLIC_PROJECT_NAME=${SITE_NAME}
        - VITE_PUBLIC_OWNER_NAME=${OWNER_NAME}
        - VITE_PUBLIC_OWNER_EMAIL=${OWNER_EMAIL}
    image: react-spa:latest
    restart: always
    environment:
      - VITE_API_URL=https://${DOMAIN}
      - VITE_PUBLIC_PROJECT_NAME=${SITE_NAME}
      - VITE_PUBLIC_OWNER_NAME=${OWNER_NAME}
      - VITE_PUBLIC_OWNER_EMAIL=${OWNER_EMAIL}
    expose:
      - '80'
    networks:
      default:
        aliases:
          - react-spa

networks:
  default:
  dokploy-network:
    external: true

volumes:
  db-data:
